<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>biomentör — Giriş</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar"></header>

  <main class="wrap">
    <section class="hero" style="padding-top:34px;">
      <h1 class="h1">Giriş</h1>
      <p class="lead">Hesabınla giriş yap.</p>
    </section>

    <section class="card">
      <form id="loginForm">
        <div class="row">
          <input id="loginEmail" type="email" placeholder="E-posta" required />
          <input id="loginPassword" type="password" placeholder="Şifre" required />
        </div>
        <button class="btn primary" type="submit">Giriş yap</button>
        <p id="loginMsg" class="muted" style="margin:10px 0 0;"></p>
      </form>
      <div class="miniRow" style="margin-top:10px;">
        <a class="btn" href="register.html">Kayıt ol</a>
      </div>
    </section>

    <footer class="footer">© <span id="year"></span> <span data-brand></span></footer>
  </main>

  <script src="assets/site.js"></script>
</body>
</html>
